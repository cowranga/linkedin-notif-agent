name: LinkedIn Notifier

# Runs the agent every 6 hours, plus a manual "Run workflow" button.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

# Avoid overlapping runs if one is slow.
concurrency:
  group: linkedin-notifier
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          LOOKBACK_HOURS: ${{ secrets.LOOKBACK_HOURS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEARTBEAT_URL: ${{ secrets.HEARTBEAT_URL }}
        run: python main.py
